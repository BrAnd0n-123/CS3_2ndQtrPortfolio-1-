
<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
		<meta name="description" content="Sample Code to implement transform and transition">
    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
				box-sizing: border-box;
			}
			#deck{
				width: 50vw;
				height: 50vh;
				margin: 0 auto 110px;
				border: 3px solid black;
				padding: 40px;
				position: relative;
			}
			#deck div{
				border: 3px solid black;
				height: 30vh;
				width: 20vw;
				background-color: white;
				color: red;
				font-size: 2em;
				padding: 5px;
				font-weight: bold;
				position: absolute;
				top: 100px;
				left: 100px;
				transform: translateX(300px) rotate(180);
				transition: all 0.5s ease;
			}
			#deck div:hover{
				border: 3px solid yellow;
			}
			#deck div:first-child:hover{
				background-color: yellow;
				transform: rotate(20);
			}
			#deck div:nth-child(2):hover{
				background-color: orange;
				transform: rotate(0);
			}
			#deck div:nth-child(3):hover{
				background-color: green;
				transform: rotate(-20);
			}
		
			#deck div:nth-child(4):hover{
				background-color: blue;
				transform: rotate(-40);
			}
			#deck div:nth-child(5):hover{
				background-color: violet;
				transform: rotate(-60);
				translate: 60px 60px;
			}
			a {
				text-decoration: none;
			}
			button {
				display: block;
				width: 25vw;
				padding: 5px;
				margin: 10px auto;
			}
		</style>
	</head>
	<body>
		<div id="deck">
			<div> &#9824;</div>
			<div> &#127808;</div>
			<div>	&#9670;</div>
			<div>	&#10084;</div>
      <div> &#127183;</div>
		</div>
    <a href="../index.html"><button> Click me for Home</button> </a>
	</body>
</html>
