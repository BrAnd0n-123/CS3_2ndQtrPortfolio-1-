<!DOCTYPE html>
<html>
    <body>

        <h1> Add a Movie </h1>

        <form>
            <label for="movieTitle"> Title: </label>
            <input type="text" id="movieTitle" name="title">

            <label for="movieYear"> Year: </label>
            <input type="text" id="movieYear" name="year">

            <label for="genre"> Genre: </label>
            <select name="genre" id="genre">
                <option value="horror">Horror</option>
                <option value="animation">Animation</option>
                <option value="action">Action</option>
                <option value="adventure">Adventure</option>
                <option value="romance">Romance</option>
            </select>

            <p> Rating </p>

                
            <input type="radio" id="star5" name="star5" value="5"> <label for="star5"></label>
            <input type="radio" id="star4" name="star4" value="4"> <label for="star4"></label>
            <input type="radio" id="star3" name="star3" value="3"> <label for="star3"></label>
            <input type="radio" id="star2" name="star2" value="2"> <label for="star2"></label>
            <input type="radio" id="star1" name="star1" value="1"> <label for="star1"></label>

            
        </form>

    </body>
</html>
