<!DOCTYPE html>
<html>
    <head>
        <title>Testing Grounds</title>
    <body>

        <h1> Sample Testing </h1>

        <script>

            function whoPassed(myObj) {

                const passedStudents = [];

                for(let KEY in myObj){
                    let scores = myObj[KEY];
                    let passed = true;

                    for(let i = 0; i < scores.length; i++){
                        let chosenScore = scores[i].split('/');
                        let numerator = Number(chosenScore[0]);
                        let denominator = Number(chosenScore[1]);

                        if(numerator !== denominator){
                            passed = false;
                            break;
                        }
                    }
                    if(passed){
                        passedStudents.push(KEY);
                    }
                }
                return passedStudents.sort();
            }


            console.log(whoPassed({
  "John" : ["5/5", "50/50", "10/10", "10/10"],
  "Sarah" : ["4/8", "50/57", "7/10", "10/18"],
  "Adam" : ["8/10", "22/25", "3/5", "5/5"],
  "Barry" : ["3/3", "20/20"]
}));

console.log(whoPassed({
  "Zara" : ["10/10"],
  "Kris" : ["30/30"],
  "Charlie" : ["100/100"],
  "Alex" : ["1/1"]
}));

console.log(whoPassed({
  "Zach" : ["10/10", "2/4"],
  "Fred" : ["7/9", "2/3"]
}))

        </script>

    </body>
</html>
